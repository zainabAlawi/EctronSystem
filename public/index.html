<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - إكترون</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="login-wrapper">
        <main class="login-container">
            <!-- Left Side: Login Form -->
            <section class="form-side">
                <div class="form-content">
                    <header class="logo-area">
                        <div class="logo-box">
                            <i class="fas fa-industry"></i>
                        </div>
                        <div class="logo-text">
                            <h1>إكترون</h1>
                        </div>

                    </header>

                    <div class="login-header">
                        <h2>تسجيل الدخول</h2>
                    </div>


                    <form id="login-form">
                        <div class="input-group">
                            <label for="username">
                                <i class="far fa-user"></i> اسم المستخدم
                            </label>
                            <div class="input-wrapper">
                                <input type="text" id="username" placeholder="أدخل اسم المستخدم الخاص بك" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="password">
                                <i class="fas fa-lock"></i> كلمة المرور
                            </label>
                            <div class="input-wrapper">
                                <input type="password" id="password" placeholder="••••••••" required>
                                <i class="far fa-eye toggle-password"></i>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox">
                                <span class="checkmark"></span>
                                تذكرني على هذا الجهاز
                            </label>
                            <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
                        </div>

                        <button type="submit" class="login-submit">
                            تسجيل الدخول <i class="fas fa-arrow-left"></i>
                        </button>
                    </form>

                    <footer class="form-footer">
                        <p>© 2026 إكترون. جميع الحقوق محفوظة.</p>
                        <div class="footer-links">
                            <a href="#">سياسة الخصوصية</a>
                            <a href="#">الدعم الفني</a>
                        </div>
                    </footer>
                </div>
            </section>

            <!-- Right Side: Industrial Image Overlay -->
            <section class="image-side">
                <div class="overlay-content">
                    <div class="main-info">

                        <h2>إكترون</h2>
                        <p>منصة رقمية متطورة لمراقبة جودة الإنتاج، إدارة البيانات اللحظية، وتحليل أداء عدادات الطاقة الذكية بأعلى معايير الدقة التقنية.</p>
                    </div>
                    <div class="accuracy-stats">
                        <span class="percentage">99.9%</span>
                        <span class="label">دقة البيانات</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
